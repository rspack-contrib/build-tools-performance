name: Benchmark

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'

  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'

  merge_group:

  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
        case: [react-1k, react-5k, react-10k, ui-components, popular-libs, rome]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Install Pnpm
        run: |
          npm i -g corepack@latest -g --force && corepack enable
          pnpm -v

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.14.1

      - name: Install Global Dependencies
        run: |
          npm i cross-env -g

      - name: Install Dependencies
        run: pnpm install && npx puppeteer browsers install chrome

      - name: Run Benchmark
        run: cross-env CASE=${{ matrix.case }} pnpm benchmark
